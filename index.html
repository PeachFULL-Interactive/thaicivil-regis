<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนฐานข้อมูลทะเบียนราษฎร</title>

    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@100;400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }
        .form-container {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 50px;
            margin-bottom: 50px;
        }
        label {
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
        }
        .form-control, .form-select {
            border-radius: 8px;
            padding: 10px 15px;
            border: 1px solid #ced4da;
        }
        /* ปรับแต่งปุ่มให้ Flex และ Responsive */
        .btn-submit {
            background: linear-gradient(90deg, #124892 0%, #032057 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 16px;
            transition: 0.3s;
            width: 100%; /* เต็มจอในมือถือ */
        }
        @media (min-width: 768px) {
            .btn-submit {
                width: auto; /* ขนาดพอดีคำในคอม */
                float: right;
            }
        }
        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            color: white;
        }
        .alert-custom {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="form-container">
                <h3 class="text-center mb-4" style="color: #124892;">ลงทะเบียนฐานข้อมูล</h3>
                
                <form name="ฐานข้อมูลทะเบียนราษฎร" id="regForm">
                    
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="คำนำหน้า">คำนำหน้า</label>
                            <select name="คำนำหน้า" class="form-select" required>
                                <option value="">เลือก...</option>
                                <option value="นาย">นาย</option>
                                <option value="นาง">นาง</option>
                                <option value="นางสาว">นางสาว</option>
                            </select>
                        </div>

                        <div class="col-md-8">
                            <label for="ชื่อและนามสกุล">ชื่อและนามสกุล</label>
                            <input type="text" name="ชื่อและนามสกุล" placeholder="กรอกชื่อ-นามสกุล" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label for="ศาสนา">ศาสนา</label>
                            <input type="text" name="ศาสนา" placeholder="กรอกศาสนา" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label for="ชื่อผู้ใช้โรบล็อก">ชื่อผู้ใช้โรบล็อก</label>
                            <input type="text" name="ชื่อผู้ใช้โรบล็อก" placeholder="Roblox Username" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label for="ชื่อผู้ใช้ดิสคอร์ด">ชื่อผู้ใช้ดิสคอร์ด</label>
                            <input type="text" name="ชื่อผู้ใช้ดิสคอร์ด" placeholder="เช่น Nevti_chox#2896" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label for="ลิงก์บัญชี">ลิงก์บัญชีโรบล็อก</label>
                            <input type="url" name="ลิงก์บัญชี" placeholder="https://www.roblox.com/users/..." class="form-control" required>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" id="submitBtn" class="btn btn-submit">
                                <i class="fa fa-paper-plane me-2"></i> ลงทะเบียน
                            </button>
                        </div>
                    </div>
                </form>

                <div id="demo" class="alert alert-primary alert-custom text-center" role="alert">
                    <b>ลงทะเบียนเรียบร้อย โปรดรอการติดต่อกลับ</b>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzU3NpjW7jrishOMZb52X4hFriHfYSjD4xfncb0A2sZU-J-BFjicmuojqJFmE5rQujD/exec';
    const form = document.forms['ฐานข้อมูลทะเบียนราษฎร'];
    const demo = document.getElementById("demo");
    const btn = document.getElementById("submitBtn");

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // ปรับแต่งปุ่มขณะกำลังส่ง
        btn.disabled = true;
        btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> กำลังบันทึกข้อมูล...';

        fetch(scriptURL, { 
            method: 'POST', 
            body: new FormData(form)
        })
        .then(response => {
            console.log('Success!', response);
            demo.style.display = 'block'; // แสดงข้อความสำเร็จ
            form.reset(); // ล้างข้อมูลในฟอร์ม
            btn.disabled = false;
            btn.innerHTML = '<i class="fa fa-paper-plane me-2"></i> ลงทะเบียนสำเร็จ';
            
            // ซ่อนข้อความหลังจาก 5 วินาที
            setTimeout(() => { 
                demo.style.display = 'none';
                btn.innerHTML = '<i class="fa fa-paper-plane me-2"></i> ลงทะเบียน';
            }, 5000);
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert('เกิดข้อผิดพลาด: ' + error.message);
            btn.disabled = false;
            btn.innerHTML = 'ลองใหม่อีกครั้ง';
        });
    });

    // สำหรับ iframe
    if(window.parent !== window) {
        try {
            parent.document.getElementsByTagName('iframe')[0].scrolling = "no";
        } catch(e) {}
    }
</script>

</body>
</html>
